server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}

app:
  security:
    cors:
      allowed-origins: "*"

logging:
  level:
    org.hibernate.SQL: WARN
    com.hospital.erp: INFO
