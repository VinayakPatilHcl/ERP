spring:
  application:
    name: hospital-erp
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_erp
    username: hospital
    password: hospital
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-please-use-a-long-random-base64-key-of-at-least-256-bits}
      expiration-minutes: 480
    cors:
      allowed-origins: http://localhost:5173,http://localhost:3000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: INFO
    com.hospital.erp: DEBUG
